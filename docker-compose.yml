version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: videorag
      POSTGRES_USER: videorag
      POSTGRES_PASSWORD: ${PG_PASSWORD:-videorag}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videorag"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://videorag:${PG_PASSWORD:-videorag}@db:5432/videorag
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      PORT: 3000
      NODE_ENV: production
    volumes:
      - user_data:/app/data/users
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl

volumes:
  pg_data:
  user_data:
  ssl_certs:
